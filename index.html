<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NNDoiT AI Studio | 呂承恩 Lu Cheng En</title>
<meta property="og:title" content="NNDoiT AI Studio | 呂承恩 Lu Cheng En"/>
<meta property="og:description" content="AI自動化與系統整合工程師｜LLM · RAG · ERP · 流程自動化"/>
<meta property="og:image" content="images/bighead.JPG"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08040c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:none;}
canvas#bg{position:fixed;inset:0;z-index:0;}

/* Cursor */
#cur{position:fixed;width:10px;height:10px;background:#ec4899;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s;}
#cur-ring{position:fixed;width:34px;height:34px;border:1.5px solid rgba(236,72,153,.55);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .14s ease;}
body:has(a:hover) #cur{width:16px;height:16px;background:#f97316;}
body:has(a:hover) #cur-ring{width:50px;height:50px;border-color:rgba(249,115,22,.6);}

/* Content */
.content{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:36px;padding:24px;max-width:780px;width:100%;}

/* Logo */
.logo{font-size:clamp(2.6rem,9vw,6.2rem);font-weight:900;letter-spacing:-0.025em;line-height:1;background:linear-gradient(135deg,#ec4899 0%,#f97316 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo .ch{display:inline-block;opacity:0;transform:translateY(44px) rotateX(-30deg);animation:charIn .55s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes charIn{to{opacity:1;transform:translateY(0) rotateX(0);}}

.sub{font-size:clamp(.95rem,2.2vw,1.25rem);color:rgba(255,255,255,.55);font-weight:500;opacity:0;animation:fadeUp .6s ease 1.4s forwards;letter-spacing:.02em;}
.prompt{font-size:clamp(.82rem,1.8vw,1rem);color:rgba(255,255,255,.35);opacity:0;animation:fadeUp .6s ease 1.8s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* Cards */
.cards{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;opacity:0;animation:fadeUp .65s ease 2.2s forwards;}
.dc{display:flex;flex-direction:column;align-items:center;gap:14px;padding:36px 44px;border-radius:28px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(16px);cursor:pointer;text-decoration:none;color:#fff;transition:all .3s cubic-bezier(.22,1,.36,1);min-width:190px;position:relative;overflow:hidden;}
.dc::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(236,72,153,.18),transparent 70%);opacity:0;transition:opacity .3s;}
.dc:hover{transform:translateY(-8px) scale(1.03);border-color:rgba(236,72,153,.55);box-shadow:0 28px 64px rgba(236,72,153,.28);}
.dc:hover::before{opacity:1;}
.dc.rec{border-color:rgba(236,72,153,.45);background:rgba(236,72,153,.1);}
.dc-icon{font-size:3.2rem;line-height:1;}
.dc-label{font-size:1.25rem;font-weight:900;}
.dc-sub{font-size:.84rem;color:rgba(255,255,255,.45);}
.rec-badge{font-size:.72rem;font-weight:900;background:linear-gradient(135deg,#ec4899,#f97316);color:#fff;padding:5px 12px;border-radius:999px;letter-spacing:.03em;}

.auto-note{font-size:.8rem;color:rgba(255,255,255,.28);opacity:0;animation:fadeUp .5s ease 2.7s forwards;}

/* Divider line */
.divider{width:1px;height:160px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.15),transparent);}
@media(max-width:520px){.cards{gap:16px;}.dc{padding:28px 32px;min-width:150px;}.divider{display:none;}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="cur"></div>
<div id="cur-ring"></div>
<div class="content">
  <div class="logo" id="logo"></div>
  <div class="sub">呂承恩 Lu Cheng En · AI自動化與系統整合工程師</div>
  <div class="prompt">請選擇您使用的裝置 · Choose your device</div>
  <div class="cards">
    <a href="desktop.html" class="dc" id="dcard">
      <div class="dc-icon">💻</div>
      <div class="dc-label">電腦版</div>
      <div class="dc-sub">Desktop Experience</div>
    </a>
    <div class="divider"></div>
    <a href="mobile.html" class="dc" id="mcard">
      <div class="dc-icon">📱</div>
      <div class="dc-label">手機版</div>
      <div class="dc-sub">Mobile Experience</div>
    </a>
  </div>
  <div class="auto-note" id="anote"></div>
</div>

<script>
/* ── Canvas particles ── */
const cvs=document.getElementById('bg'),ctx=cvs.getContext('2d');
let W,H,pts=[];
function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;}
resize();addEventListener('resize',resize);
class P{constructor(){this.r();}
  r(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.45;this.vy=(Math.random()-.5)*.45;this.s=Math.random()*1.6+.4;this.a=Math.random()*.4+.08;}
  u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.r();}
  d(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=`rgba(236,72,153,${this.a})`;ctx.fill();}
}
for(let i=0;i<130;i++)pts.push(new P());
function link(){
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(236,72,153,${.07*(1-d/110)})`;ctx.lineWidth=.6;ctx.stroke();}
  }
}
(function draw(){
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.9);
  g.addColorStop(0,'#1a0820');g.addColorStop(1,'#06030a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  pts.forEach(p=>{p.u();p.d();});link();
  requestAnimationFrame(draw);
})();

/* ── Logo letter reveal ── */
const text='NNDoiT AI Studio',el=document.getElementById('logo');
text.split('').forEach((c,i)=>{
  const s=document.createElement('span');
  s.className='ch';s.textContent=c===' '?'\u00a0':c;
  s.style.animationDelay=`${i*.055}s`;
  el.appendChild(s);
});

/* ── Auto-detect ── */
const mob=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||innerWidth<768;
const note=document.getElementById('anote');
const badge=document.createElement('div');badge.className='rec-badge';
if(mob){
  document.getElementById('mcard').classList.add('rec');
  badge.textContent='✦ 偵測到手機裝置';
  document.getElementById('mcard').prepend(badge);
  note.textContent='已自動偵測到手機，建議選擇手機版獲得最佳體驗';
}else{
  document.getElementById('dcard').classList.add('rec');
  badge.textContent='✦ 偵測到電腦裝置';
  document.getElementById('dcard').prepend(badge);
  note.textContent='已自動偵測到電腦，建議選擇電腦版獲得最佳體驗';
}

/* ── Custom cursor ── */
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function animCur(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animCur);})();
</script>
</body>
</html>
